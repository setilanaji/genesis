# MCP Toolbox — tools.yaml
# Genesis: Google Docs + Calendar only (Tasks replaced by Linear MCP)
# Run: toolbox --tools-file mcp/tools.yaml

sources: {}

tools:

  # ── Google Docs ──────────────────────────────────────────────────────────────
  create_google_doc:
    kind: http
    description: >
      Creates a new Google Doc with the given title and body.
      Returns { "doc_id": "...", "url": "https://docs.google.com/..." }.
    endpoint: http://localhost:8001/docs/create
    method: POST
    request_body_schema:
      type: object
      required: [title, body]
      properties:
        title:
          type: string
        body:
          type: string

  delete_google_doc:
    kind: http
    description: Deletes a Google Doc by doc_id. Used for saga rollback.
    endpoint: http://localhost:8001/docs/delete
    method: POST
    request_body_schema:
      type: object
      required: [doc_id]
      properties:
        doc_id:
          type: string

  # ── Google Calendar ───────────────────────────────────────────────────────────
  create_calendar_event:
    kind: http
    description: >
      Creates a Google Calendar event.
      Returns { "event_id": "...", "url": "..." }.
    endpoint: http://localhost:8001/calendar/create
    method: POST
    request_body_schema:
      type: object
      required: [title, start, end]
      properties:
        title:
          type: string
        start:
          type: string
          description: ISO-8601 datetime with timezone (e.g. 2025-09-10T10:00:00+08:00)
        end:
          type: string
        description:
          type: string
        attendees:
          type: array
          items:
            type: string

  delete_calendar_event:
    kind: http
    description: Deletes a Google Calendar event by event_id. Used for saga rollback.
    endpoint: http://localhost:8001/calendar/delete
    method: POST
    request_body_schema:
      type: object
      required: [event_id]
      properties:
        event_id:
          type: string
