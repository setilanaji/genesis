sources:
  local-api:
    kind: http
    baseUrl: http://localhost:8001

tools:

  # ── Google Docs ──────────────────────────────────────────────────────────────
  create_google_doc:
    kind: http
    source: local-api
    description: >
      Creates a new Google Doc with the given title and body.
      Returns { "doc_id": "...", "url": "https://docs.google.com/..." }.
    method: POST
    path: /docs/create
    requestBody: |
      { "title": "{{.title}}", "body": "{{.body}}" }
    bodyParams:
      - name: title
        type: string
        description: Document title
      - name: body
        type: string
        description: Document body content

  delete_google_doc:
    kind: http
    source: local-api
    description: Deletes a Google Doc by doc_id. Used for saga rollback.
    method: POST
    path: /docs/delete
    requestBody: |
      { "doc_id": "{{.doc_id}}" }
    bodyParams:
      - name: doc_id
        type: string
        description: The Google Doc ID to delete

  # ── Google Calendar ───────────────────────────────────────────────────────────
  create_calendar_event:
    kind: http
    source: local-api
    description: >
      Creates a Google Calendar event.
      Returns { "event_id": "...", "url": "..." }.
    method: POST
    path: /calendar/create
    requestBody: |
      {
        "title": "{{.title}}",
        "start": "{{.start}}",
        "end": "{{.end}}",
        "description": "{{.description}}",
        "attendees": "{{.attendees}}"
      }
    bodyParams:
      - name: title
        type: string
        description: Event title
      - name: start
        type: string
        description: ISO-8601 datetime with timezone (e.g. 2025-09-10T10:00:00+08:00)
      - name: end
        type: string
        description: ISO-8601 datetime with timezone
      - name: description
        type: string
        description: Event description (optional)
      - name: attendees
        type: string
        description: Comma-separated list of attendee email addresses (optional)

  delete_calendar_event:
    kind: http
    source: local-api
    description: Deletes a Google Calendar event by event_id. Used for saga rollback.
    method: POST
    path: /calendar/delete
    requestBody: |
      { "event_id": "{{.event_id}}" }
    bodyParams:
      - name: event_id
        type: string
        description: The calendar event ID to delete